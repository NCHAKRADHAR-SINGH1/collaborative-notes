spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/collabnotes;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=${APP_JWT_SECRET:change_this_secret_for_prod}
app.jwt.expiration=3600000

server.port=8080

# Expose actuator health endpoint for container healthchecks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
